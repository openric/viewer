  Public demo of @openric/viewer, loaded from unpkg CDN (the published
  npm package — NOT the local source tree). Proves that the viewer
  works purely from what is published, not from build-time tricks.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenRiC Viewer — demo</title>
  <meta name="description" content="Live demo of @openric/viewer against OpenRiC-conformant servers." />
  <link rel="canonical" href="https://viewer.openric.org/" />
  <style>
    :root {
      --fg: #e5e7eb; --muted: #9ca3af; --bg: #111827; --panel: #0f172a;
      --border: #1f2937; --accent: #3b82f6;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--fg); }
    header { padding: 0.75rem 1rem; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 1rem; font-weight: 600; }
    header a { color: var(--accent); text-decoration: none; }
    header a:hover { text-decoration: underline; }
    header label { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.85rem; color: var(--muted); }
    header select, header input, header button {
      background: #1f2937; color: var(--fg); border: 1px solid #374151;
      padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.85rem;
    }
    header button { cursor: pointer; background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    header button:hover { background: #2563eb; }
    #viewer { width: 100vw; height: calc(100vh - 58px); }
    .hint { color: var(--muted); font-size: 0.8rem; margin-left: auto; }
    .error-panel { padding: 1rem; color: #fca5a5; font-family: monospace; }
  </style>

  <!-- Peer deps from CDN (the @openric/viewer package declares these as peerDeps) -->
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/three@0.160.1/build/three.min.js"></script>
  <script src="https://unpkg.com/three-spritetext@1.8.1/dist/three-spritetext.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>

  <!-- The viewer itself, from the published npm package -->
  <script src="https://unpkg.com/@openric/viewer@0.1/dist/openric-viewer.umd.js"></script>
</head>
<body>
  <header>
    <h1><a href="https://openric.org">OpenRiC</a> · Viewer demo</h1>
    <label>Server
      <select id="server">
        <option value="https://heratio.theahg.co.za/api/ric/v1">Heratio (reference)</option>
        <option value="custom">Custom URL…</option>
      </select>
    </label>
    <input id="customUrl" placeholder="https://your-server/api/ric/v1" style="display:none; width: 18rem;" />
    <label>Start
      <input id="start" value="/records/records" style="width: 14rem;" />
    </label>
    <label>Mode
      <select id="mode">
        <option value="2d">2D</option>
        <option value="3d">3D</option>
      </select>
    </label>
    <button id="go">Load</button>
    <span class="hint">
      <a href="https://www.npmjs.com/package/@openric/viewer">npm</a> ·
      <a href="https://github.com/openric/viewer">source</a>
    </span>
  </header>
  <div id="viewer"></div>

  <script>
    const { mount } = window.OpenricViewer;
    const viewerEl = document.getElementById('viewer');
    const serverSel = document.getElementById('server');
    const customUrl = document.getElementById('customUrl');
    const startInput = document.getElementById('start');
    const modeSel = document.getElementById('mode');
    const goBtn = document.getElementById('go');

    let handle = null;

    serverSel.addEventListener('change', () => {
      customUrl.style.display = serverSel.value === 'custom' ? '' : 'none';
    });

    function currentServer() {
      return serverSel.value === 'custom' ? customUrl.value.trim() : serverSel.value;
    }

    function load() {
      if (handle) { try { handle.unmount(); } catch {} }
      try {
        handle = mount(viewerEl, {
          server: currentServer(),
          start: startInput.value,
          mode: modeSel.value,
          depth: 2,
          onNodeClick: (node) => {
            if (!node || !node.id) return;
            let path = node.id;
            try { if (path.startsWith('http')) path = new URL(path).pathname; } catch {}
            startInput.value = path;
            handle.setRoot(path);
          },
        });
      } catch (e) {
        viewerEl.innerHTML = `<div class="error-panel">Failed to load viewer: ${e.message}</div>`;
      }
    }

    goBtn.addEventListener('click', load);
    load();
  </script>
</body>
</html>
